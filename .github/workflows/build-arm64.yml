name: Build & Publish Mattermost ARM64

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'env.example'
      - '.github/workflows/build-arm64.yml'
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  # Image name = ghcr.io/<owner>/<repo>  (lowercased automatically by GitHub)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build ARM64 image & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Read Mattermost version from env.example ─────────────────────────
      - name: Read Mattermost version and edition from env.example
        id: mm_version
        run: |
          VERSION=$(grep '^MATTERMOST_IMAGE_TAG=' env.example | cut -d= -f2)
          EDITION=$(grep '^MATTERMOST_IMAGE='     env.example | cut -d= -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "edition=${EDITION}" >> "$GITHUB_OUTPUT"
          echo "Mattermost version: ${VERSION}  edition: ${EDITION}"

      # ── 3. Set up QEMU (needed for ARM64 emulation on x86 runner) ───────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── 4. Set up Docker Buildx ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to Docker Hub (avoids pull rate-limit on the base image) ────
      # Requires secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (read-only PAT).
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Log in to GitHub Container Registry ──────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Extract Docker metadata (tags + labels) ──────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag with the Mattermost version read from env.example
            type=raw,value=${{ steps.mm_version.outputs.version }}
            # also tag as latest on every push to main
            type=raw,value=latest
            # tag with short commit SHA for traceability
            type=sha,prefix=sha-,format=short

      # ── 7. Build & push for linux/arm64 ─────────────────────────────────────
      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MATTERMOST_VERSION=${{ steps.mm_version.outputs.version }}
            MATTERMOST_EDITION=${{ steps.mm_version.outputs.edition }}
          # Cache layers in the GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 8. Trigger EasyPanel deploy via webhook ──────────────────────────────
      - name: Deploy via EasyPanel API
        run: |
          echo "Triggering EasyPanel deploy..."
          HTTP_STATUS=$(curl -sSo /dev/null -w "%{http_code}" \
            "http://146.235.51.226:3000/api/compose/deploy/a937e62a63578f35236f20607403ca70bc91691cdbebe3e9")
          echo "HTTP status: ${HTTP_STATUS}"
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "Deploy webhook failed with status ${HTTP_STATUS}"
            exit 1
          fi
          echo "Deploy triggered successfully."
